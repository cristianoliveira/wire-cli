name: CI checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint and Format
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: wire-cli
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Enter Nix dev shell and check format
        run: |
          nix develop --command bash -c "./gradlew --no-daemon ktlintCheck"
          nix develop --command bash -c "./gradlew --no-daemon detekt"
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android

  test-unit:
    name: Unit Tests
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: wire-cli
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Enter Nix dev shell and run unit tests
        run: |
          nix develop --command bash -c "mkdir -p \$HOME/.android && ./gradlew --no-daemon test"
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: build/reports/tests/

  test-integration:
    name: Integration Tests (Bats)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: wire-cli
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Enter Nix dev shell and run integration tests
        run: |
          nix develop --command bash -c "mkdir -p \$HOME/.android && ./gradlew --no-daemon batsTest"
        env:
          ANDROID_USER_HOME: ${{ github.workspace }}/.android

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: build/reports/tests/
