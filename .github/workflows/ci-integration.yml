name: CI integration tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

# Slow lane: installed-CLI integration tests via Bats. All cache keys are built
# at the step level because hashFiles() and runner.os are not available in
# workflow-level env. GRADLE_USER_HOME is shared with the quick-checks
# workflow so the Kalium cold build is paid once across runs.
env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  integration-tests:
    name: Build and integration tests (bats)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle*', '**/gradle.lockfile', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build installDist
        run: ./gradlew --no-daemon installDist

      - name: Smoke test the built binary
        run: build/install/wire/bin/wire --help

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run bats integration tests
        run: |
          nix develop --command bash -c "WIRE_BIN=build/install/wire/bin/wire bats --print-output-on-failure test/bats"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: |
            build/reports/tests/
            build/test-results/
