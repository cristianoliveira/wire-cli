android.disableAnalytics=true
# Gradle JVM settings
org.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError

# Parallel execution
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin settings
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.multiplatform=true

# Suppress Xcode warning
kotlin.apple.xcodeCompatibility.nowarn=true

# Required by newer Kalium builds (explicit provider cache scope selection)
kalium.providerCacheScope=LOCAL
# Enable Android targets by default (can be disabled via -PenableAndroid=false)
enableAndroid=true
