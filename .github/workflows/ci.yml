name: CI quick checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

# Quick lane: linters and unit tests run as parallel jobs. Shares one Gradle
# cache (keyed on gradle inputs) with the integration-tests workflow so the
# Kalium cold build is paid once across runs.
env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  GRADLE_CACHE_KEY: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle*', '**/gradle.lockfile', '**/libs.versions.toml') }}

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.gradle
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: ktlint and detekt
        run: |
          nix develop --command bash -c "mkdir -p \$HOME/.android \"\$GRADLE_USER_HOME\" && chmod -R +x \"\$GRADLE_USER_HOME\"/caches/modules-2/files-2.1/com.google.protobuf/protoc/*/protoc-*-linux-x86_64.exe 2>/dev/null || true && ./gradlew --no-daemon ktlintCheck"
          nix develop --command bash -c "mkdir -p \$HOME/.android \"\$GRADLE_USER_HOME\" && chmod -R +x \"\$GRADLE_USER_HOME\"/caches/modules-2/files-2.1/com.google.protobuf/protoc/*/protoc-*-linux-x86_64.exe 2>/dev/null || true && ./gradlew --no-daemon detekt"
        env:
          ANDROID_USER_HOME: "${{ github.workspace }}/.android"
          XDG_CACHE_HOME: "${{ github.workspace }}/.cache"
          XDG_CONFIG_HOME: "${{ github.workspace }}"
          GRADLE_OPTS: "-Dnix.build=true -Duser.home=${{ github.workspace }} -Dgradle.user.home=${{ github.workspace }}/.gradle"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.gradle
          key: ${{ env.GRADLE_CACHE_KEY }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: ./gradlew --no-daemon test

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            build/reports/tests/
            build/test-results/
