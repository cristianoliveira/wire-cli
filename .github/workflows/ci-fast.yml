name: CI Build and Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: Build and integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build and run unit tests
        run: |
          ./gradlew --no-daemon installDist test

      - name: Test the built binary
        run: |
          build/install/wire/bin/wire --help

      - name: Enter Nix dev shell and run integration tests
        run: |
          nix develop --command bash -c "WIRE_BIN=build/install/wire/bin/wire bats --print-output-on-failure test/bats"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            build/reports/tests/
            build/test-results/
