name: CI Build and Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: Build with Nix
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: |
        max-jobs = 1
        cores = 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build with Nix
        run: |
          nix build --max-jobs 1 --cores 1

      - name: Nix flake checks
        run: |
          nix flake check --max-jobs 1 --cores 1

      - name: Test the built binary
        run: |
          ./result/bin/wire-cli --help

      - name: Enter Nix dev shell and run integration tests
        run: |
          nix develop --command bash -c "WIRE_BIN=./result/bin/wire-cli bats --print-output-on-failure test/bats"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            build/reports/tests/
            build/test-results/
